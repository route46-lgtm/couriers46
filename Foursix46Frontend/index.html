<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- DNS Prefetch and Preconnect for External Resources -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />


  <!-- Preconnect for local image optimization -->

  <!-- Preload hero image for LCP (local image) -->
  <link rel="preload" as="image" href="/Route46_truckimage.jpg" fetchpriority="high" />

  <title>Same Day Courier Services UK | Route46 Couriers</title>
  <meta name="description"
    content="Fast, reliable same-day courier services across the UK. Secure transport, professional drivers, and real-time updates with Route46 Couriers." />
  <meta name="author" content="Route46" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Same Day Courier Services UK | Route46 Couriers" />
  <meta property="og:description"
    content="Fast, reliable same-day courier services across the UK. Secure transport, professional drivers, and real-time updates with Route46 Couriers." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/Route46_Logo.jpeg" />
  <link rel="canonical" href="https://route46couriers.co.uk/" />

  <meta name="robots" content="index, follow" />
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@Route46" />
  <meta name="twitter:image" content="/Route46_Logo.jpeg" />

  <!-- Theme Color for Mobile Browsers -->
  <meta name="theme-color" content="#F8F8F8" />
  <!-- 1. Consent defaults -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }

  gtag('consent', 'default', {
    ad_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied',
    analytics_storage: 'denied',
    functionality_storage: 'denied',
    personalization_storage: 'denied',
    security_storage: 'granted',
    wait_for_update: 500
  });

  gtag('set', 'ads_data_redaction', true);
  gtag('set', 'url_passthrough', true);
</script>

<!-- 2. CookieYes -->
<script id="cookieyes" type="text/javascript"
  src="https://cdn-cookieyes.com/client_data/806dd9435fca1f4570080fef39d8e42d/script.js">
</script>

<!-- 3. GA4 blocked until analytics consent -->
<script
  async
  data-cookieyes="cookieyes-analytics"
  src="https://www.googletagmanager.com/gtag/js?id=G-DJ2LG13XLG">
</script>
<script data-cookieyes="cookieyes-analytics">
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-DJ2LG13XLG', {
    anonymize_ip: true
  });
</script>
</head>

<body>
  <div id="root">
    <!-- Static content for LCP detection (removed once React loads) -->
    <div
      style="position: relative; width: 100%; height: 100vh; background-color: #134467; display: flex; align-items: center; justify-content: center; overflow: hidden;">
      <!-- Hero Image for LCP -->
      <img src="/Route46_truckimage.jpg" alt="Route46 Courier Hero"
        style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;"
        fetchpriority="high" loading="eager" width="1920" height="1080" />
      <!-- Overlay -->
      <div
        style="position: absolute; inset: 0; background: linear-gradient(to right, rgba(10,37,56,0.4), rgba(10,37,56,0.3)); z-index: 10;">
      </div>
      <!-- Hero Text for LCP -->
      <div style="position: relative; z-index: 20; text-align: center; padding: 0 1rem;">
        <h1
          style="color: #48AEDD; font-size: clamp(2rem, 5vw, 4rem); font-weight: 800; margin: 0 0 1rem 0; line-height: 1.2;">
          same day courier service<br><span style="color: #F81E30;"> UK</span>
        </h1>
        <p style="color: rgb(229 231 235); font-size: clamp(1rem, 2vw, 1.25rem); max-width: 600px; margin: 0 auto;">
          From urgent parcels to business logistics, <strong style="color: white;">Route46</strong> delivers with
          precision and uniqueness.
        </p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
